    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f6f0; /* Soft warm background matched to YarnStash design */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .verification-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(74, 59, 50, 0.08);
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-sizing: border-box;
        }

        .brand-logo {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
            object-fit: contain;
        }

        h2 {
            color: #4a3b32; /* Deep earth tone */
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        p {
            color: #7a6e67;
            font-size: 14px;
            line-height: 1.5;
            margin: 0 0 30px 0;
        }

        .code-inputs {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 25px;
        }

        .code-input {
            width: 100%;
            height: 56px;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            border: 2px solid #ddd6ce;
            border-radius: 10px;
            background-color: #faf9f6;
            color: #4a3b32;
            transition: all 0.2s ease;
        }

        .code-input:focus {
            border-color: #9c8470;
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(156, 132, 112, 0.2);
        }

        /* Error state styling */
        .code-input.error {
            border-color: #c96f6f;
            background-color: #fffafb;
            box-shadow: 0 0 0 3px rgba(201, 111, 111, 0.2);
        }

        .btn-verify {
            background-color: #6e8e75; /* Cozy structural green */
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-verify:hover {
            background-color: #57725c;
        }

        .btn-verify:active {
            transform: scale(0.99);
        }

        .resend-container {
            margin-top: 25px;
            font-size: 13px;
            color: #9c8470;
        }

        .resend-link {
            color: #6e8e75;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .resend-link.disabled {
            color: #bfaea2;
            cursor: not-allowed;
            pointer-events: none;
        }
    </style>
</head>

<script>
    const inputs = document.querySelectorAll('.code-input');
    const form = document.getElementById('verify-form');
    const resendLink = document.getElementById('resend-link');
    const verifyEmailLabel = document.getElementById('verify-email');
    const queryParams = new URLSearchParams(window.location.search);
    const verifyUser = queryParams.get('user');
    const verifyEmail = queryParams.get('email');

    function initVerification() {
        if (verifyEmailLabel) {
            verifyEmailLabel.textContent = verifyEmail || 'your email address';
        }

        if (!verifyUser) {
            alert('Verification details are missing. Please sign up again.');
            window.location.href = 'index.html';
            return;
        }
    }

    initVerification();
    // timerSpan will be queried dynamically to avoid stale references
    
    // 1. Auto-Focus Next Element, Backspace Logic, and Numeric Validation
    inputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
            // Only allow numbers
            const value = e.target.value;
            e.target.value = value.replace(/[^0-9]/g, '');

            if (e.target.value.length === 1 && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && e.target.value.length === 0 && index > 0) {
                inputs[index - 1].focus();
            }
        });
    });

    // 2. Premium UX: Clipboard Paste Support across all inputs
    inputs.forEach((startInput, startIndex) => {
        startInput.addEventListener('paste', (e) => {
            e.preventDefault();
            const pasteData = (e.clipboardData || window.clipboardData).getData('text').trim();

            // Only handle numeric paste
            if (/^\d+$/.test(pasteData)) {
                const digits = pasteData.split('');
                for (let i = 0; i < digits.length && (startIndex + i) < inputs.length; i++) {
                    inputs[startIndex + i].value = digits[i];
                }
                // Focus next empty input or the last filled
                const nextPos = Math.min(startIndex + digits.length, inputs.length - 1);
                inputs[nextPos].focus();
            }
        });
    });

    let countdown = 30;
    function startResendTimer() {
        const interval = setInterval(() => {
            countdown--;
            const t = document.getElementById('timer');
            if (t) t.textContent = countdown;
            if (countdown <= 0) {
                clearInterval(interval);
                resendLink.classList.remove('disabled');
                // show simple label when enabled
                resendLink.textContent = "Resend code";
            }
        }, 1000);
    }
    startResendTimer();

    resendLink.addEventListener('click', (e) => {
        e.preventDefault();
        if (resendLink.classList.contains('disabled')) return;
        
        alert("A fresh 6-digit confirmation code has been dispatched!");

        // Reset the timer parameters and rebuild the timer span
        countdown = 30;
        resendLink.classList.add('disabled');
        resendLink.innerHTML = 'Resend code (in <span id="timer">30</span>s)';
        startResendTimer();
    });

    // 4. Form Action Execution
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        let fullCode = "";
        inputs.forEach(input => fullCode += input.value);
        
        if (fullCode.length === 6) {
            const userRegistry = JSON.parse(localStorage.getItem('yarnstash_global_registry')) || {};
            if (!verifyUser || !userRegistry[verifyUser]) {
                alert('No pending verification was found. Please sign up again.');
                window.location.href = 'index.html';
                return;
            }

            userRegistry[verifyUser].verified = true;
            localStorage.setItem('yarnstash_global_registry', JSON.stringify(userRegistry));
            localStorage.setItem('yarnstash_current_session', verifyUser);
            localStorage.removeItem('yarnstash_pending_verification');

            alert(`Email verified for ${verifyEmail || verifyUser}. Redirecting to your stash...`);
            window.location.href = 'index.html';
        }
    });
</script>

</body>
</html>
